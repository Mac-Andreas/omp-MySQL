# =============================================================================
#  omp-MySQL — example connection config (for mysql_connect_config)
#
#  Credential-safety layers, in order of what actually protects you:
#   1. ${ENV} secrets  — keep the password OUT of this (shippable) file. Set
#      OMP_DB_PASS in the server's environment; the value below is just a ref.
#   2. Least-privilege DB user — see tools/least-privilege-user.sql. This is what
#      limits the damage if the config still leaks.
#   3. (Optional) obfuscate this file with mysql_config_obfuscate() so a dumped
#      server dir doesn't show it in plaintext. The obfuscation key is YOUR secret
#      from the environment (export OMP_CFG_KEY=...), not in the public source.
#      Honest: still obfuscation, not secrecy — but the key isn't in the files.
#   4. Mandatory TLS — enforced by the component (fail-closed) AND REQUIRE SSL on
#      the user. ssl_mode=2 (VERIFY_IDENTITY) is the strongest; needs a CA whose
#      cert matches the server host (see the README on certs).
#
#  Comments start with # or ; . Values support ${VAR} environment expansion.
# =============================================================================

host     = 127.0.0.1
port     = 3306
user     = omp_app
password = ${OMP_DB_PASS}
database = ompdb

# --- TLS (mandatory; pick a verification strictness) -------------------------
# 0 = REQUIRED (encrypt, don't verify cert)
# 1 = VERIFY_CA (encrypt + chain to a trusted CA)
# 2 = VERIFY_IDENTITY (encrypt + CA + hostname)  <-- recommended in production
ssl_mode = 2
ssl_ca   = scriptfiles/mysql-ca.pem
# tls_version = TLSv1.3,TLSv1.2

# --- Diagnostics (opt-in; default OFF) ---------------------------------------
# debug     = 1
# debug_log = logs/mysql-debug.log
